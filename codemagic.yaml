workflows:
  # 工作流1：仅构建 macOS 安装包（你核心需求，优先保证）
  build-macos:
    name: Build macOS App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter config --enable-macos-desktop
      - flutter pub get
      - flutter build macos --release
      - hdiutil create -volname "MyApp" -srcfolder build/macos/Build/Products/Release/*.app -ov -format UDZO ./MyApp-Mac.dmg
    artifacts:
      - ./MyApp-Mac.dmg