workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build macOS release app
        script: |
          flutter build macos --release --no-tree-shake-icons
    artifacts:
      - build/macos/Build/Products/Release/*.app
      - build/macos/Build/Products/Release/*.zip
    publishing:
      email:
        recipients:
          - mc_fuyunqi@foxmail.com
        notify:
          success: true
          failure: true