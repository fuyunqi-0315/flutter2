workflows:
  build-macos-windows:
    name: Build macOS + Windows App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      # 启用所有平台
      - flutter config --enable-macos-desktop
      - flutter config --enable-windows-desktop

      # 安装依赖
      - flutter pub get

      # --------------------------
      # 构建 macOS（.app + .dmg）
      # --------------------------
      - flutter build macos --release
      - hdiutil create -volname "MyApp" -srcfolder "build/macos/Build/Products/Release/MyApp.app" -ov -format UDZO ./MyApp-Mac.dmg

      # --------------------------
      # 构建 Windows（.zip）
      # --------------------------
      - flutter build windows --release
      - zip -r ./MyApp-Windows.zip build/windows/x64/runner/Release/*

    artifacts:
      # 构建完成后可下载这两个文件
      - ./MyApp-Mac.dmg
      - ./MyApp-Windows.zip