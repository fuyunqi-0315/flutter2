workflows:
  ios-release:
    name: iOS Release (IPA for AiSi)
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      flutter: stable
      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: "Get Flutter packages"
        script: flutter pub get

      - name: "Build IPA"
        # 关键：--no-codesign 表示不签名，交给爱思助手处理
        script: flutter build ipa --release --no-codesign

    artifacts:
      # 关键：这里使用通配符，不管生成什么名字的文件，只要在这个目录下都抓取
      - build/ios/ipa/**/*.ipa
      - build/ios/ipa/**/*.app
