workflows:
  # 工作流1：在 macOS 机器上构建 macOS 安装包
  build-macos:
    name: Build macOS App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter config --enable-macos-desktop
      - flutter pub get
      - flutter build macos --release
      - hdiutil create -volname "MyApp" -srcfolder build/macos/Build/Products/Release/*.app -ov -format UDZO ./MyApp-Mac.dmg
    artifacts:
      - ./MyApp-Mac.dmg

  # 工作流2：在 Windows 机器上构建 Windows 安装包
  build-windows:
    name: Build Windows App
    instance_type: standard
    max_build_duration: 60
    environment:
      flutter: stable
      os: windows
    scripts:
      - flutter config --enable-windows-desktop
      - flutter pub get
      - flutter build windows --release
      - powershell Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ./MyApp-Windows.zip
    artifacts:
      - ./MyApp-Windows.zip