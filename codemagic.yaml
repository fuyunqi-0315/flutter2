workflows:
  build-macos:
    name: Build macOS App
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      # 1. 开启macOS桌面支持
      - flutter config --enable-macos-desktop
      # 2. 确保项目包含macOS工程文件
      - flutter create . --platforms=macos
      # 3. 获取依赖
      - flutter pub get
      # 4. 编译 Release 版本
      - flutter build macos --release

      # --- 关键步骤：打包成 DMG ---
      # 这里我们将安装包生成在根目录，并明确命名为 "MyMacApp.dmg"
      - echo "📦 正在打包 DMG 安装包..."
      - hdiutil create -volname "MyMacApp" -srcfolder build/macos/Build/Products/Release/*.app -ov -format UDZO ./MyMacApp.dmg

    artifacts:
      # 这里必须写和上面完全一样的文件名，前面加上 ./ 表示根目录
      - ./MyMacApp.dmg