workflows:
  build-macos:
    name: Build macOS App
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      # 1. 开启macOS桌面支持
      - flutter config --enable-macos-desktop
      # 2. 确保项目包含macOS工程文件
      - flutter create . --platforms=macos
      # 3. 获取依赖
      - flutter pub get
      # 4. 编译 Release 版本
      - flutter build macos --release

      # --- 下面这几行是关键：把 .app 打包成 .dmg 安装包 ---
      - echo "📦 正在将 App 打包成 DMG 镜像..."
      # 创建一个名为 MyFlutterApp 的磁盘镜像，包含编译好的 App
      - hdiutil create -volname "MyFlutterApp" -srcfolder build/macos/Build/Products/Release/*.app -ov -format UDZO MyFlutterApp.dmg

    artifacts:
      # 告诉 Codemagic 保存生成的 dmg 文件
      - MyFlutterApp.dmg